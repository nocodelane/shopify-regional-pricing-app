query CartTransformRunInput {
  cart {
    attribute(key: "_regionMultiplier") {
      value
    }
    rules: attribute(key: "_regionalRules") {
      value
    }
    lines {
      id
      quantity
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
    }
  }
}
